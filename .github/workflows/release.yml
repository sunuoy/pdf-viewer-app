name: Build & Publish Release APK

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare APK for Release
        run: |
          mkdir -p release_assets
          TAG_NAME="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="latest"
          fi
          cp app/build/outputs/apk/debug/app-debug.apk "release_assets/PulsePDF-Reader-${TAG_NAME}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PulsePDF Reader ${{ github.ref_name }}"
          files: release_assets/*.apk
          overwrite: true
          generate_release_notes: true
          body: |
            ## 🚀 PulsePDF Reader Release

            ### ✨ Key Features
            - **📄 High-Performance PDF Viewing**: Smooth scrolling, zoom, and document rendering.
            - **🔍 Search & Text Extraction**: Built-in indexing powered by PDFBox.
            - **🌐 On-Device Translation**: Integrated Google ML Kit translation capabilities.
            - **📂 Smart Document Management**: Saved preferences, dark mode, and Room persistence.

            ---
            *Automated release build generated by GitHub Actions.*
